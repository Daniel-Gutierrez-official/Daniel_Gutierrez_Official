<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hematology & Cardio Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.quiz-container {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 15px;
    width: 700px;
    max-width: 95%;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    margin-bottom: 15px;
}

button {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.option-btn {
    background: #3498db;
    color: white;
}

.option-btn:hover {
    background: #2980b9;
}

.correct {
    background: #27ae60 !important;
}

.wrong {
    background: #c0392b !important;
}

#next-btn {
    background: #f39c12;
    display: none;
}

#score {
    font-size: 18px;
    margin-top: 15px;
}

</style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Question text</h2>
    <div id="options"></div>
    <button id="next-btn">Next Question</button>
    <div id="score"></div>
</div>

<script>
const quizData = [
    {
        question: "What is the correct term for development of red blood cells?",
        options: ["Hematopoiesis", "Erythropoiesis", "Lymphopoiesis", "Megakaryocyte production"],
        answer: "Erythropoiesis"
    },
    {
        question: "A decrease in ______ causes hypoxia and release of ______.",
        options: ["Carbon dioxide; proteins", "Water; endorphins", "Oxygen; erythropoietin", "Hydrogen; blood"],
        answer: "Oxygen; erythropoietin"
    },
    {
        question: "Which anemia causes rigid, abnormally shaped RBCs?",
        options: ["Iron deficiency anemia", "Aplastic anemia", "Pernicious anemia", "Sickle cell anemia"],
        answer: "Sickle cell anemia"
    },
    {
        question: "Classic manifestations of anemia?",
        options: ["Pain and swelling", "Fatigue, weakness, dyspnea, pallor", "Persistent cough", "Increased thirst"],
        answer: "Fatigue, weakness, dyspnea, pallor"
    },
    {
        question: "Which anemia may require bone marrow transplant?",
        options: ["Aplastic anemia", "Iron deficiency anemia", "Thalassemia", "CKD anemia"],
        answer: "Aplastic anemia"
    },
    {
        question: "What does koilonychia mean?",
        options: ["Craving dirt", "Spoon-shaped nails", "Painful tongue", "Megaloblastic madness"],
        answer: "Spoon-shaped nails"
    },
    {
        question: "Which is treated with oral ferrous sulfate?",
        options: ["Iron deficiency anemia", "Pernicious anemia", "Folate deficiency", "Thalassemia"],
        answer: "Iron deficiency anemia"
    },
    {
        question: "If hemoglobin is too low, common treatment?",
        options: ["Ferrous sulfate", "EPO therapy", "Blood transfusion", "Bone marrow transplant"],
        answer: "Blood transfusion"
    },
    {
        question: "Bone marrow makes too many cells → increased viscosity?",
        options: ["Relative polycythemia", "Polycythemia vera", "Secondary polycythemia", "Thrombosis"],
        answer: "Polycythemia vera"
    },
    {
        question: "Calf pain, swelling, warmth may indicate?",
        options: ["PE", "DVT", "Anemia", "MI"],
        answer: "DVT"
    },
    {
        question: "Valve narrowing is called?",
        options: ["Regurgitation", "Stenosis", "Insufficiency", "Incompetence"],
        answer: "Stenosis"
    },
    {
        question: "Most common cause of myocardial ischemia?",
        options: ["Vasospasm", "Arterial emboli", "Atherosclerotic plaque", "Venous emboli"],
        answer: "Atherosclerotic plaque"
    },
    {
        question: "Angina relieved by rest and nitro?",
        options: ["Stable angina", "Prinzmetal", "Unstable angina", "Variant angina"],
        answer: "Stable angina"
    },
    {
        question: "Enlarged ventricles and low EF?",
        options: ["Restrictive", "Dilated cardiomyopathy", "Hypertrophic", "Hypertensive"],
        answer: "Dilated cardiomyopathy"
    },
    {
        question: "Elevated D-dimer indicates?",
        options: ["High cholesterol", "Increased clotting activity", "Low BP", "Dehydration"],
        answer: "Increased clotting activity"
    }
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("next-btn");
const scoreEl = document.getElementById("score");

function loadQuestion() {
    nextBtn.style.display = "none";
    optionsEl.innerHTML = "";
    const current = quizData[currentQuestion];
    questionEl.innerText = current.question;

    current.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.classList.add("option-btn");
        btn.addEventListener("click", () => selectAnswer(btn, current.answer));
        optionsEl.appendChild(btn);
    });
}

function selectAnswer(button, correctAnswer) {
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctAnswer) {
            btn.classList.add("correct");
        }
    });

    if (button.innerText !== correctAnswer) {
        button.classList.add("wrong");
    } else {
        score++;
    }

    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        showResults();
    }
});

function showResults() {
    questionEl.innerText = "Quiz Complete!";
    optionsEl.innerHTML = "";
    nextBtn.style.display = "none";
    scoreEl.innerText = `Your Score: ${score} / ${quizData.length}`;
}

loadQuestion();
</script>

</body>
</html>
