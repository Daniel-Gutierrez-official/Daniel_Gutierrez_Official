<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Hematology & Cardio Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.quiz-container {
    background: rgba(0,0,0,0.85);
    width: 900px;
    max-width: 95%;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    overflow-y: auto;
    max-height: 95vh;
}

h1 { text-align: center; }

#progress-container {
    width: 100%;
    background: #555;
    border-radius: 10px;
    margin-bottom: 20px;
}

#progress-bar {
    height: 15px;
    width: 0%;
    background: #27ae60;
    border-radius: 10px;
}

button {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.option-btn { background: #3498db; color: white; }
.option-btn:hover { background: #2980b9; }
.correct { background: #27ae60 !important; }
.wrong { background: #c0392b !important; }

#next-btn, #restart-btn { background: #f39c12; }

#difficulty { margin-bottom: 15px; }

#score-display { font-size: 18px; margin-top: 15px; }

</style>
</head>
<body>

<div class="quiz-container">
    <h1>Hematology & Cardio Master Quiz</h1>

    <select id="difficulty">
        <option value="all">All Questions</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <h2 id="question"></h2>
    <div id="options"></div>
    <button id="next-btn" style="display:none;">Next Question</button>
    <button id="restart-btn" style="display:none;">Restart Quiz</button>
    <div id="score-display"></div>
</div>

<script>

const allQuestions = [
// WEEK 4
{q:"Development of red blood cells?",o:["Hematopoiesis","Erythropoiesis","Lymphopoiesis","Megakaryocyte production"],a:"Erythropoiesis",d:"easy"},
{q:"Decrease in ____ causes hypoxia and release of ____.",o:["Carbon dioxide; proteins","Water; endorphins","Oxygen; erythropoietin","Hydrogen; blood"],a:"Oxygen; erythropoietin",d:"easy"},
{q:"Rigid, abnormally shaped RBCs?",o:["Iron deficiency","Aplastic","Pernicious","Sickle cell"],a:"Sickle cell",d:"easy"},
{q:"Systemic manifestations of mild-moderate anemia?",o:["Increased HR","Low RBC & Hgb","Exertional SOB","All of the above"],a:"All of the above",d:"medium"},
{q:"Classic manifestations of anemia?",o:["Pain & swelling","Fatigue weakness dyspnea pallor","Persistent cough","Increased thirst"],a:"Fatigue weakness dyspnea pallor",d:"easy"},
{q:"Anemia that may require bone marrow transplant?",o:["Aplastic anemia","Sickle cell","Iron deficiency","CKD anemia"],a:"Aplastic anemia",d:"medium"},
{q:"Koilonychia means?",o:["Craving dirt","Spoon shaped nails","Painful tongue","Megaloblastic madness"],a:"Spoon shaped nails",d:"easy"},
{q:"Anemia treated with oral ferrous sulfate?",o:["Iron deficiency","Pernicious","Folate deficiency","Thalassemia"],a:"Iron deficiency",d:"easy"},
{q:"Common treatment if Hgb/Hct too low?",o:["Ferrous sulfate","EPO therapy","Blood transfusion","Bone marrow transplant"],a:"Blood transfusion",d:"medium"},
{q:"Bone marrow makes too many cells increasing viscosity?",o:["Relative polycythemia","Polycythemia vera","Secondary polycythemia","Thrombosis"],a:"Polycythemia vera",d:"hard"},

// WEEK 5
{q:"Oxygen carrying protein in RBC?",o:["Platelet","Hemoglobin","Plasma","Albumin"],a:"Hemoglobin",d:"easy"},
{q:"Calf pain, swelling, warmth indicates?",o:["MI","DVT","Anemia","Stroke"],a:"DVT",d:"easy"},
{q:"Most abundant blood cell?",o:["Platelet","Leukocyte","Erythrocyte","Lymphocyte"],a:"Erythrocyte",d:"easy"},
{q:"Where hematopoiesis occurs after birth?",o:["Liver","Spleen","Bone marrow","Kidney"],a:"Bone marrow",d:"easy"},
{q:"Vitamin K deficiency risk?",o:["Clotting","Bleeding","Hypertension","Polycythemia"],a:"Bleeding",d:"easy"},
{q:"Bleeding and clotting at same time?",o:["DVT","DIC","Anemia","Hemophilia"],a:"DIC",d:"medium"},
{q:"Nutritional deficiency anemia?",o:["Iron deficiency","Sickle cell","Aplastic","CKD"],a:"Iron deficiency",d:"easy"},
{q:"Kidney hormone for RBC production?",o:["Insulin","Erythropoietin","ADH","Aldosterone"],a:"Erythropoietin",d:"easy"},
{q:"Caused by decreased platelet production?",o:["Thrombocytopenia","Polycythemia","Leukocytosis","Anemia"],a:"Thrombocytopenia",d:"medium"},
{q:"Avoid to prevent sickle cell crisis?",o:["Exercise","Smoking","Hydration","Iron"],a:"Smoking",d:"medium"},
{q:"Indicator of RBC destruction?",o:["Albumin","Bilirubin","Glucose","Calcium"],a:"Bilirubin",d:"medium"},
{q:"Dislodged clot?",o:["Thrombus","Embolus","Plaque","Hematoma"],a:"Embolus",d:"easy"},

// WEEK 6
{q:"Right sided heart failure manifestation?",o:["Bilateral ankle edema","Distended bladder","Facial edema","Low BP only"],a:"Bilateral ankle edema",d:"medium"},
{q:"Valve narrowing called?",o:["Regurgitation","Stenosis","Insufficiency","Incompetence"],a:"Stenosis",d:"easy"},
{q:"Left ventricle pumps harder for years leads to?",o:["Atrophy","Stronger forever","Hypertrophy & HF","EF 100%"],a:"Hypertrophy & HF",d:"medium"},
{q:"Most common cause myocardial ischemia?",o:["Vasospasm","Arterial emboli","Atherosclerotic plaque","Venous emboli"],a:"Atherosclerotic plaque",d:"medium"},
{q:"Organs impacted by HTN & atherosclerosis?",o:["Brain","Kidneys","Eyes","All of the above"],a:"All of the above",d:"medium"},
{q:"Modifiable HTN risk factor?",o:["Family history","Increased age","Sedentary lifestyle","Genetics"],a:"Sedentary lifestyle",d:"medium"},
{q:"Ischemia occurs when ____ insufficient.",o:["CO2","Hydrogen","ATP","Oxygen"],a:"Oxygen",d:"easy"},
{q:"Angina relieved by rest & nitro?",o:["Stable","Unstable","Variant","Prinzmetal"],a:"Stable",d:"medium"},
{q:"Enlarged ventricles & low EF?",o:["Restrictive","Dilated","Hypertrophic","Hypertensive"],a:"Dilated",d:"hard"},
{q:"Chest pain radiates to back + fever?",o:["MI","Cardiac tamponade","Acute pericarditis","Mitral stenosis"],a:"Acute pericarditis",d:"hard"},

// KAHOOT
{q:"Stimulates erythropoietin release?",o:["Low blood sugar","High iron","Low oxygen","High BP"],a:"Low oxygen",d:"easy"},
{q:"Nutrient needed to form RBCs?",o:["Calcium","Vitamin C","Magnesium","Iron"],a:"Iron",d:"easy"},
{q:"Main cause iron deficiency anemia?",o:["Poor diet/bleeding","Genetics","Exercise","High BP"],a:"Poor diet/bleeding",d:"easy"},
{q:"Vitamin K role in clotting?",o:["Decrease HR","RBC formation","Synthesizes clotting factors","Increase BP"],a:"Synthesizes clotting factors",d:"medium"},
{q:"Classic sign of anemia?",o:["Increased appetite","Fatigue & pallor","Weight gain","High energy"],a:"Fatigue & pallor",d:"easy"},
{q:"Primary treatment hemophilia?",o:["Pain relievers","Surgery","Antibiotics","Blood products"],a:"Blood products",d:"medium"},
{q:"Elevated D-dimer indicates?",o:["High cholesterol","Increased clotting activity","Low BP","Dehydration"],a:"Increased clotting activity",d:"medium"}
];

let quizQuestions=[];
let current=0;
let score=0;

const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");
const nextBtn=document.getElementById("next-btn");
const restartBtn=document.getElementById("restart-btn");
const scoreDisplay=document.getElementById("score-display");
const progressBar=document.getElementById("progress-bar");
const difficultySelect=document.getElementById("difficulty");

function shuffle(array){return array.sort(()=>Math.random()-0.5);}

function startQuiz(){
const level=difficultySelect.value;
quizQuestions=level==="all"?[...allQuestions]:allQuestions.filter(q=>q.d===level);
shuffle(quizQuestions);
current=0;score=0;
restartBtn.style.display="none";
scoreDisplay.innerText="";
loadQuestion();}

function loadQuestion(){
nextBtn.style.display="none";
optionsEl.innerHTML="";
const q=quizQuestions[current];
questionEl.innerText=q.q;
progressBar.style.width=((current)/quizQuestions.length)*100+"%";
shuffle(q.o).forEach(option=>{
const btn=document.createElement("button");
btn.innerText=option;
btn.classList.add("option-btn");
btn.onclick=()=>selectAnswer(btn,q.a);
optionsEl.appendChild(btn);});}

function selectAnswer(btn,correct){
document.querySelectorAll(".option-btn").forEach(b=>{
b.disabled=true;
if(b.innerText===correct)b.classList.add("correct");});
if(btn.innerText!==correct){btn.classList.add("wrong");}else{score++;}
nextBtn.style.display="block";}

nextBtn.onclick=()=>{current++;if(current<quizQuestions.length){loadQuestion();}else{finishQuiz();}};

function finishQuiz(){
questionEl.innerText="Quiz Complete!";
optionsEl.innerHTML="";
progressBar.style.width="100%";
nextBtn.style.display="none";
restartBtn.style.display="block";
let highScore=localStorage.getItem("highScore")||0;
if(score>highScore){localStorage.setItem("highScore",score);highScore=score;}
scoreDisplay.innerHTML=`Your Score: ${score}/${quizQuestions.length}<br>High Score: ${highScore}`;}

restartBtn.onclick=startQuiz;
difficultySelect.onchange=startQuiz;
startQuiz();

</script>
</body>
</html>
