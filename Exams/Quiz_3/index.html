<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prokaryotic Cells Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

.question {
    margin-bottom: 20px;
}

.answers label {
    display: block;
    padding: 6px;
    cursor: pointer;
}

button {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background-color: #2c7be5;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    background-color: #1a5fd1;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">
    <h1>Prokaryotic Cells & Microorganisms Quiz</h1>
    <form id="quizForm"></form>
    <button onclick="submitQuiz()">Submit Quiz</button>
    <div class="result" id="result"></div>
</div>

<script>
const quizData = [
{
    question: "1. All living cells contain which of the following?",
    options: ["Chloroplasts", "Membrane-bound organelles", "DNA and ribosomes", "A nucleus"],
    answer: 2
},
{
    question: "2. Prokaryotic cells differ from eukaryotic cells because they:",
    options: ["Have mitochondria", "Lack a nucleus", "Have membrane-bound organelles", "Contain linear chromosomes"],
    answer: 1
},
{
    question: "3. The primary component of bacterial cell walls is:",
    options: ["Cellulose", "Chitin", "Peptidoglycan", "Sterols"],
    answer: 2
},
{
    question: "4. Gram-positive bacteria stain ______ after a Gram stain procedure.",
    options: ["Red", "Pink", "Purple", "Colorless"],
    answer: 2
},
{
    question: "5. Gram-negative bacteria contain which unique outer membrane component?",
    options: ["Teichoic acid", "Lipopolysaccharide (LPS)", "Mycolic acid", "Flagellin"],
    answer: 1
},
{
    question: "6. The function of flagella is:",
    options: ["DNA transfer", "Protein synthesis", "Attachment", "Motility"],
    answer: 3
},
{
    question: "7. A bacterium with flagella at both ends is described as:",
    options: ["Monotrichous", "Amphitrichous", "Peritrichous", "Lophotrichous"],
    answer: 1
},
{
    question: "8. Fimbriae primarily function in:",
    options: ["Motility", "Protein production", "Adhesion", "Photosynthesis"],
    answer: 2
},
{
    question: "9. Pili are primarily involved in:",
    options: ["Energy production", "Conjugation", "Capsule formation", "Endospore formation"],
    answer: 1
},
{
    question: "10. The glycocalyx may form a highly organized structure called a:",
    options: ["Slime layer", "Capsule", "Peptidoglycan", "Porin"],
    answer: 1
},
{
    question: "11. The cytoplasm of bacteria is approximately ______ water.",
    options: ["10–20%", "30–40%", "50–60%", "70–80%"],
    answer: 3
},
{
    question: "12. Prokaryotic ribosomes are:",
    options: ["80S", "70S", "50S only", "30S only"],
    answer: 1
},
{
    question: "13. Plasmids are:",
    options: ["Essential for survival", "Found only in eukaryotes", "Small circular DNA molecules", "Ribosomal subunits"],
    answer: 2
},
{
    question: "14. Endospores are:",
    options: ["A form of reproduction", "Metabolically active cells", "Highly resistant survival structures", "Found in all bacteria"],
    answer: 2
},
{
    question: "15. Which genera are known for producing endospores?",
    options: ["Escherichia and Salmonella", "Clostridium and Bacillus", "Mycoplasma and Nocardia", "Rickettsia and Chlamydia"],
    answer: 1
},
{
    question: "16. A spherical bacterium is called a:",
    options: ["Bacillus", "Spirillum", "Coccus", "Vibrio"],
    answer: 2
},
{
    question: "17. A spring-like bacterium is called a:",
    options: ["Spirillum", "Spirochete", "Vibrio", "Coccobacillus"],
    answer: 1
},
{
    question: "18. The Gram stain is considered a:",
    options: ["Simple stain", "Structural stain", "Differential stain", "Capsule stain"],
    answer: 2
},
{
    question: "19. Mycobacterium species are identified using which stain?",
    options: ["Gram stain", "Endospore stain", "Acid-fast stain", "Capsule stain"],
    answer: 2
},
{
    question: "20. The two domains of prokaryotes are:",
    options: ["Bacteria and Eukarya", "Archaea and Bacteria", "Protista and Bacteria", "Archaea and Fungi"],
    answer: 1
}
];

const quizForm = document.getElementById("quizForm");

quizData.forEach((q, index) => {
    const questionDiv = document.createElement("div");
    questionDiv.classList.add("question");

    questionDiv.innerHTML = `<p>${q.question}</p>`;

    const answersDiv = document.createElement("div");
    answersDiv.classList.add("answers");

    q.options.forEach((option, i) => {
        answersDiv.innerHTML += `
            <label>
                <input type="radio" name="question${index}" value="${i}">
                ${option}
            </label>
        `;
    });

    questionDiv.appendChild(answersDiv);
    quizForm.appendChild(questionDiv);
});

function submitQuiz() {
    let score = 0;

    quizData.forEach((q, index) => {
        const selected = document.querySelector(`input[name="question${index}"]:checked`);
        if (selected && parseInt(selected.value) === q.answer) {
            score++;
        }
    });

    const result = document.getElementById("result");
    result.innerHTML = `You scored ${score} out of ${quizData.length}`;
}
</script>

</body>
</html>
